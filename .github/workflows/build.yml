name: Build & Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:

jobs:
  # ── macOS (arm64 + x64 DMG) ──────────────────────────────────
  build-macos:
    runs-on: macos-latest          # Apple Silicon (M1) runner
    strategy:
      matrix:
        arch: [arm64, x64]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Build & Make (${{ matrix.arch }})
        run: npx electron-forge make --arch=${{ matrix.arch }}

      - uses: actions/upload-artifact@v4
        with:
          name: macos-${{ matrix.arch }}
          path: out/make/*.dmg
          if-no-files-found: error

  # ── Windows (Squirrel + ZIP) ──────────────────────────────────
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Build & Make
        run: npx electron-forge make

      - uses: actions/upload-artifact@v4
        with:
          name: windows
          path: |
            out/make/squirrel.windows/**/*.exe
            out/make/zip/**/*.zip
          if-no-files-found: error

  # ── GitHub Release ────────────────────────────────────────────
  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [build-macos, build-windows]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true
          path: artifacts

      - name: List artifacts
        run: find artifacts -type f | head -30

      - uses: softprops/action-gh-release@v2
        with:
          draft: false
          generate_release_notes: true
          files: |
            artifacts/**/*.dmg
            artifacts/**/*.exe
            artifacts/**/*.zip
